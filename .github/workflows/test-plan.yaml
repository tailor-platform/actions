name: Test Plan Action

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: test-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Secrets are not available for PRs from forks
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    env:
      WORKSPACE_NAME: actions-plan-test-${{ github.run_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tests/deploy/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tests/deploy
        run: pnpm install

      - name: Create test workspace
        id: setup
        working-directory: tests/deploy
        env:
          TAILOR_PLATFORM_MACHINE_USER_CLIENT_ID: ${{ secrets.PLATFORM_MACHINE_USER_CLIENT_ID }}
          TAILOR_PLATFORM_MACHINE_USER_CLIENT_SECRET: ${{ secrets.PLATFORM_MACHINE_USER_CLIENT_SECRET }}
          TAILOR_PLATFORM_ORGANIZATION_ID: ${{ vars.TAILOR_PLATFORM_ORGANIZATION_ID }}
          TAILOR_PLATFORM_FOLDER_ID: ${{ vars.TAILOR_PLATFORM_FOLDER_ID }}
        run: |
          npx tailor-sdk login --machineuser

          CREATE_ARGS=(--name "$WORKSPACE_NAME" --region asia-northeast --organization-id "$TAILOR_PLATFORM_ORGANIZATION_ID")
          if [ -n "$TAILOR_PLATFORM_FOLDER_ID" ]; then
            CREATE_ARGS+=(--folder-id "$TAILOR_PLATFORM_FOLDER_ID")
          fi
          WORKSPACE_ID=$(npx tailor-sdk workspace create -j "${CREATE_ARGS[@]}" | jq -r '.id')
          echo "workspace-id=$WORKSPACE_ID" >> "$GITHUB_OUTPUT"
          echo "Created test workspace: $WORKSPACE_ID"

      - name: Run plan action
        uses: ./plan
        with:
          workspace-id: ${{ steps.setup.outputs.workspace-id }}
          working-directory: tests/deploy
          platform-client-id: ${{ secrets.PLATFORM_MACHINE_USER_CLIENT_ID }}
          platform-client-secret: ${{ secrets.PLATFORM_MACHINE_USER_CLIENT_SECRET }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workspace
        if: always() && steps.setup.outputs.workspace-id != ''
        working-directory: tests/deploy
        env:
          WORKSPACE_ID: ${{ steps.setup.outputs.workspace-id }}
        run: npx tailor-sdk workspace delete --workspace-id "$WORKSPACE_ID" --yes
